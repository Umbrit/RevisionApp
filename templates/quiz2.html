<!DOCTYPE html>
<html>
<head>
    <title>Group 7 The Halogens</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>{{ quiz_title }}</h1>
    {% if question %}
    <p class="question-text">{{ question['question'] }}</p>
    {% if feedback %}
        <p id="feedback">{{ feedback }}</p>
        <script>
            setTimeout(function() {
                window.location.href = "{{ url_for('quiz2') }}";
            }, 5000);
        </script>
    {% endif %}
    
        <form method="post">
            {% for option in question['options'] %}
                <input type="radio" name="answer" value="{{ option }}"> {{ option }}<br>
            {% endfor %}
            <input type="submit" value="Next">
        </form>
        <p>Score: {{ score }} / {{ total }}</p>
    {% else %}
        <p>Quiz completed!</p>
        <a href="{{ url_for('restart', quiz='quiz2') }}">Restart Quiz 2</a>
    {% endif %}
</body>
</html>
